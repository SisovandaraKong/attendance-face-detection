services:
  postgres:
    image: postgres:15-alpine
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: attendance
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
    ports:
      - "5168:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nectar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  nectar-network:
    driver: bridge
